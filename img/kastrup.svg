<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#b7410e"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fly { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes dot-travel { 0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    .plane { animation: fly 2s ease-in-out infinite; }
    .dot1 { animation: dot-travel 2s ease-in-out infinite; }
    .dot2 { animation: dot-travel 2s ease-in-out 0.5s infinite; }
    .dot3 { animation: dot-travel 2s ease-in-out 1s infinite; }
  </style>
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#rust)" stroke-width="3"/>
  <!-- Hub ring -->
  <circle cx="128" cy="115" r="35" fill="none" stroke="#f74c00" stroke-width="2" opacity="0.5"/>
  <circle cx="128" cy="115" r="6" fill="#f74c00" opacity="0.8"/>
  <!-- Spokes to message sources -->
  <line x1="128" y1="80" x2="128" y2="50" stroke="#4c4" stroke-width="1.5" opacity="0.4"/>
  <circle class="dot1" cx="128" cy="65" r="2" fill="#4c4"/>
  <rect x="118" y="36" width="20" height="13" rx="2" fill="none" stroke="#4c4" stroke-width="1.5"/>
  <polyline points="118,38 128,45 138,38" fill="none" stroke="#4c4" stroke-width="1"/>
  <line x1="155" y1="95" x2="185" y2="70" stroke="#51afef" stroke-width="1.5" opacity="0.4"/>
  <circle class="dot2" cx="170" cy="82" r="2" fill="#51afef"/>
  <text x="186" y="68" font-family="sans-serif" font-size="14" font-weight="bold" fill="#51afef">#</text>
  <line x1="101" y1="95" x2="71" y2="70" stroke="#f80" stroke-width="1.5" opacity="0.4"/>
  <circle class="dot3" cx="86" cy="82" r="2" fill="#f80"/>
  <circle cx="60" cy="60" r="10" fill="none" stroke="#f80" stroke-width="1.5"/>
  <path d="M55,57 A7,7 0 0,1 65,57" fill="none" stroke="#f80" stroke-width="1"/>
  <line x1="163" y1="115" x2="198" y2="115" stroke="#77d" stroke-width="1.5" opacity="0.4"/>
  <line x1="93" y1="115" x2="58" y2="115" stroke="#e55" stroke-width="1.5" opacity="0.4"/>
  <line x1="128" y1="150" x2="128" y2="170" stroke="#5b5" stroke-width="1.5" opacity="0.4"/>
  <!-- Plane -->
  <g class="plane" transform="translate(170, 45)">
    <polygon points="0,8 20,4 0,0 3,4" fill="#f74c00" opacity="0.7"/>
  </g>
  <text x="128" y="206" font-family="monospace" font-size="20" font-weight="bold" fill="url(#rust)" text-anchor="middle" letter-spacing="2">kastrup</text>
  <text x="128" y="224" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">unified messaging hub</text>
</svg>
